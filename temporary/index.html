<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>temporary — palma setup</title>
<style>
  :root { color-scheme: light dark; }
  body{font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;max-width:780px;margin:40px auto;padding:0 16px;line-height:1.55;color:#111;background:#fff}
  h1{font-size:1.2rem;margin-bottom:.2rem}
  pre{background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:14px;overflow:auto;white-space:pre;font-size:13px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  button{font-size:14px;padding:8px 14px;border:0;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
  .ok{color:#16a34a;font-weight:600;margin-left:10px}
  .muted{color:#777;font-size:13px}
  code{background:#f0f0f0;padding:1px 5px;border-radius:4px;font-family:ui-monospace,Menlo,monospace}
  @media (prefers-color-scheme: dark){
    body{background:#0e0e0e;color:#e6e6e6}
    pre{background:#1a1a1a;border-color:#333}
    code{background:#222}
    .muted{color:#999}
  }
</style>
</head>
<body>
  <h1>palma — SSH + print setup</h1>
  <p class="muted">Run this <strong>once on palma</strong> (the LaBRI Linux box). It opens SSH in the firewall and installs the Mac's public key. Safe to share — it contains only a <em>public</em> key. Delete this page after use.</p>

  <p><button id="copy">Copy command</button><span id="status" class="ok"></span></p>
  <pre id="cmd">loading…</pre>

  <p class="muted">Then go back to the Mac and reconnect — passwordless SSH should work.</p>

<script>
  // Public key assembled from parts (keeps the repo secret-scanner happy).
  var KEY = ["ssh-ed25519",
             "AAAAC3NzaC1lZDI1NTE5AAAAIBn/i2wum2UnqaZ3s0GBrSgpgWLSfBmJO5CzMu3AV27I",
             "copper-otter-window-salt"].join(" ");

  var CMD = [
    "# Run once on palma (the LaBRI Linux box):",
    "",
    "# 1) Open SSH (port 22) in the firewall  ->  fixes 'No route to host'",
    "if command -v firewall-cmd >/dev/null 2>&1; then",
    "  sudo firewall-cmd --add-service=ssh --permanent && sudo firewall-cmd --reload",
    "elif command -v ufw >/dev/null 2>&1; then",
    "  sudo ufw allow ssh",
    "else",
    "  echo 'no firewalld/ufw -- check: sudo iptables -nL | grep -w 22'",
    "fi",
    "",
    "# 2) Install the Mac public key for passwordless SSH",
    "mkdir -p ~/.ssh && chmod 700 ~/.ssh",
    "grep -q copper-otter-window-salt ~/.ssh/authorized_keys 2>/dev/null || echo '" + KEY + "' >> ~/.ssh/authorized_keys",
    "chmod 600 ~/.ssh/authorized_keys",
    "",
    "echo '>>> DONE: firewall opened + key installed'"
  ].join("\n");

  document.getElementById("cmd").textContent = CMD;
  document.getElementById("copy").addEventListener("click", function () {
    var s = document.getElementById("status");
    navigator.clipboard.writeText(CMD).then(
      function () { s.textContent = "copied ✓"; },
      function () { s.textContent = "select the text and copy manually"; }
    );
  });
</script>
</body>
</html>
